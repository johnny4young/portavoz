name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      # Non-strict: only error-level violations fail the build; warnings are
      # surfaced as PR annotations. See .swiftlint.yml for the rationale.
      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging
