name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      # Strict (`strict: true` en .swiftlint.yml): CUALQUIER violación rompe
      # el build. El código pasa con cero violaciones sobre Sources.
      - name: SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging
