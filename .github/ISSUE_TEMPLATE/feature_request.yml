name: Feature request
description: Suggest a capability, integration, or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Portavoz is privacy-first and local-first. Proposals that would send audio,
        transcripts, or summaries off-device must keep it an explicit, clearly-labeled
        opt-in — see CONTRIBUTING.md.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Portavoz makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the behavior or UI if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Capture (mic / system audio)
        - Transcription (live / refine)
        - Diarization (who-said-what)
        - Summaries / Intelligence
        - Companion (live questions)
        - App UI
        - CLI / automation
        - Integrations (GitHub / Linear / MCP / Shortcuts)
        - iOS / iPadOS
        - Other
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: This proposal keeps audio/transcripts on-device by default (or explains why an opt-in cloud path is justified).
          required: true
