<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 14px; background: var(--bg-window); font-family: var(--font-app); color: var(--text-primary); }
  a { color: var(--accent); } a:hover { opacity: 0.8; }
</style>
</head>
<body>
<div style="display: flex; gap: 12px; align-items: stretch;">
  <div style="flex: 1.2; background: var(--brand-radial); border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 18px;">
    <img src="../assets/portavoz-icon-p.svg" width="34" height="34" alt="" style="border-radius: 8px;">
    <span style="font-family: var(--font-display); font-variation-settings: 'SOFT' 50; font-weight: 600; font-size: 24px; color: var(--brand-ink);">Portavoz</span>
  </div>
  <div style="flex: 1; background: var(--bg-sidebar); border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 18px;">
    <img src="../assets/portavoz-icon-p.svg" width="26" height="26" alt="" style="border-radius: 6px;">
    <span style="font: 600 15px/1 var(--font-app); color: var(--text-primary);">Portavoz</span>
  </div>
  <div style="flex: 0.7; background: var(--brand-ground-1); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; padding: 12px;">
    <span style="color: #f3f1ec; display: inline-flex;"><img src="../assets/portavoz-icon-p-menubar.svg" width="17" height="17" alt="" style="filter: invert(1);"></span>
    <span style="font: 500 9px/1.3 var(--font-mono); color: var(--brand-ink-dim); text-align: center;">menu bar 16px</span>
  </div>
</div>
</body>
</html>
