# SwiftLint para Portavoz — config estricta recomendada de industria.
#
# El CI corre `swiftlint lint --strict`: CUALQUIER violación (warning o
# error) rompe el build. El objetivo es cero violaciones sobre `Sources`.
# Reglas por defecto de SwiftLint + un set opt-in ampliamente recomendado
# (correctness/claridad), con umbrales de industria. Las pocas excepciones
# inherentes (líneas de datos sha256 del catálogo de modelos) se silencian
# in-line con justificación, no relajando la regla para todos.

included:
  - Sources

excluded:
  - .build
  - Portavoz.xcodeproj
  - dist

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - lower_acl_than_parent
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

# Umbrales de industria. SwiftUI y el código de audio/DSP producen cuerpos
# largos legítimos; los archivos de vistas grandes se parten en extensiones.
line_length:
  warning: 120
  error: 200
  ignores_urls: true
  ignores_comments: true
  ignores_interpolated_strings: true

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 700
  error: 1000
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 12
  error: 20

function_parameter_count:
  warning: 6
  error: 8

large_tuple:
  warning: 3
  error: 4

identifier_name:
  min_length:
    warning: 2
    error: 0
  max_length:
    warning: 50
    error: 80
  excluded:
    - id
    - db
    - t
    - a
    - b
    - c
    - i
    - j
    - k
    - m
    - n
    - p
    - q
    - r
    - s
    - u
    - v
    - x
    - y
    - z
    - dx
    - dy
    - ok
    - me
    - lhs
    - rhs
    - h1
    - h2
    - h3
    - html_url
    - meeting_id
    - parameter_size
    - whisperLargeV3_626MB

reporter: "xcode"
