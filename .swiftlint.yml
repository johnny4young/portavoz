# SwiftLint para Portavoz — introducido en M9 (higiene OSS).
#
# Calibrado para que el código actual pase con CERO violaciones de nivel
# *error*: el CI corre `swiftlint lint` en modo no-strict, así que solo los
# errores rompen el build. Los *warnings* son guía que apretamos con el tiempo
# (bajar umbrales, habilitar reglas). No es un formateador — el estilo del
# repo (comas colgantes en literales multilínea) se respeta desactivando las
# reglas que lo contradicen.

included:
  - Sources

excluded:
  - .build
  - Portavoz.xcodeproj
  - dist

disabled_rules:
  # El repo usa comas colgantes en literales multilínea por convención
  # (p.ej. las descripciones de Core Audio). No pelear con ello.
  - trailing_comma
  - todo # los TODO/FIXME se rastrean en issues, no en el linter

opt_in_rules:
  - empty_count
  - first_where
  - last_where
  - contains_over_first_not_nil
  - toggle_bool
  - closure_end_indentation
  - unneeded_parentheses_in_closure_argument

# Realidad del dominio: el código de audio/ML/matemáticas tiene líneas,
# funciones y archivos más largos que un CRUD típico. Los umbrales de *error*
# quedan por encima de los máximos actuales; los *warning* siguen cazando
# bloat genuino.
line_length:
  warning: 140
  error: 400
  ignores_urls: true
  ignores_comments: true

function_body_length:
  warning: 80
  error: 220

type_body_length:
  warning: 350
  error: 750

file_length:
  warning: 600
  error: 1600
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 14
  error: 40

large_tuple:
  warning: 3
  error: 5

function_parameter_count:
  warning: 6
  error: 9

identifier_name:
  min_length:
    warning: 2
    error: 0 # nunca error por nombre corto
  max_length:
    warning: 60
    error: 90
  excluded:
    # Nombres cortos de matemáticas/DSP y bucles.
    - id
    - db
    - t
    - a
    - b
    - c
    - i
    - j
    - k
    - m
    - n
    - p
    - q
    - r
    - s
    - u
    - v
    - x
    - y
    - z
    - dx
    - dy
    - ok
    - me
    - lhs
    - rhs
    - h1
    - h2
    - h3
    # Campos de DTOs de APIs externas (GitHub, Ollama…): conservar el nombre
    # del wire tal cual llega en el JSON.
    - html_url
    - meeting_id
    - parameter_size
    # Identificador del catálogo de modelos (variante Whisper de 626 MB).
    - whisperLargeV3_626MB

reporter: "xcode"
